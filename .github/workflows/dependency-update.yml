name: Dependency Update

on:
  schedule:
    # Weekly check for opamp-go updates (Monday at 9am UTC)
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-updates:
    name: Check for opamp-go Updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      
      - name: Check latest opamp-go version
        id: check
        run: |
          LATEST=$(go list -m -json github.com/open-telemetry/opamp-go@latest 2>/dev/null | grep '"Version"' | cut -d'"' -f4)
          CURRENT=$(grep 'open-telemetry/opamp-go' go.mod | awk '{print $2}')
          echo "Current: $CURRENT"
          echo "Latest: $LATEST"
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
      
      - name: Create Pull Request
        if: steps.check.outputs.current != steps.check.outputs.latest
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update opamp-go from ${{ steps.check.outputs.current }} to ${{ steps.check.outputs.latest }}"
          title: "chore(deps): update opamp-go to ${{ steps.check.outputs.latest }}"
          body: |
            This PR updates the opamp-go dependency from `${{ steps.check.outputs.current }}` to `${{ steps.check.outputs.latest }}`.
            
            This is an automated PR generated by the dependency update workflow.
          branch: deps/update-opamp-go
          base: main
          labels: dependencies, opamp-upstream